[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
gas_reports = ["*"]
fs_permissions = [{ access = "read-write", path = "./" }]

[fuzz]
runs = 256

[invariant]
runs = 64
depth = 32
fail_on_revert = false

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC}"
optimism_sepolia = "${OPTIMISM_SEPOLIA_RPC}"
base_sepolia = "${BASE_SEPOLIA_RPC}"
mainnet = "${MAINNET_RPC}"

[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", chain = 421614 }
optimism_sepolia = { key = "${OPSCAN_API_KEY}", chain = 11155420 }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }
